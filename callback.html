<!DOCTYPE html>                                                                                                                             
  <html lang="en">                                          
  <head><meta charset="UTF-8"><title>TikTok Auth Callback</title>
  <style>
    body{font-family:sans-serif;max-width:600px;margin:80px auto;padding:0 20px;text-align:center;color:#333}
    #code{font-family:monospace;font-size:14px;background:#f5f5f5;padding:16px;border-radius:8px;word-break:break-all;margin:20px 0}
    .error{color:#c00}
  </style>
  </head>
  <body>
  <h2>TikTok Authorization</h2>
  <div id="msg"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const error = params.get('error');
    const msg   = document.getElementById('msg');
    if (code) {
      msg.innerHTML = '<p>Copy this code and paste it into your terminal:</p>'
        + '<div id="code">' + code + '</div>'
        + '<button onclick="navigator.clipboard.writeText(\'' + code + '\').then(()=>this.textContent=\'Copied!\')">Copy to
  clipboard</button>';
    } else {
      msg.innerHTML = '<p class="error">Error: ' + (error || 'unknown') + '</p>';
    }
  </script>
  </body>
  </html>
